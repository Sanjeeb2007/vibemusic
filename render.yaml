services:
  - type: web
    name: vibemusic-backend
    env: node
    buildCommand: >
      npm install &&
      apt-get install -y ffmpeg 2>/dev/null || true &&
      mkdir -p bin &&
      curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o bin/yt-dlp &&
      chmod +x bin/yt-dlp
    startCommand: node server.js
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
    healthCheckPath: /health
    autoDeploy: true
